  "int": "C++最基本的整数类型，通常占4字节（32位），表示范围约-21亿到+21亿，具体大小依赖平台。",
  "double": "双精度浮点类型，通常占8字节（64位），提供约15位有效数字，是C++默认的浮点类型。",
  "char": "字符类型，占1字节（8位），用于存储ASCII字符，本质是整数（0-127对应ASCII码）。",
  "bool": "布尔类型，占1字节，取值为true（1）或false（0），用于逻辑判断。",
  "void": "空类型，表示\"无类型\"，用于函数返回类型（不返回值）、指针类型（void*，可指向任意类型）等场景。",
  "类型大小": "不同类型在内存中占用的字节数，可通过sizeof运算符获取，依赖于编译器和平台。",
  "sizeof": "C++运算符，用于在编译期获取类型或对象占用的内存字节数，是编写可移植代码的重要工具。",
  "有符号无符号": "整数类型分为有符号（signed，可表示负数）和无符号（unsigned，仅表示非负数），无符号类型的取值范围更大但不能为负。",
  "枚举": "Enumeration，用户定义的一种整数类型，为一组相关的整数常量赋予有意义的名字，提高代码可读性。",
  "enum": "C++关键字，用于定义枚举类型，传统枚举（C风格枚举）的枚举值会隐式转换为整数。",
  "enum class": "C++11引入的强类型枚举，枚举值不会隐式转换为整数，作用域限制在枚举名内，避免命名污染。",
  "强类型枚举": "即enum class，相比传统enum更安全，不会发生意外类型转换，推荐使用。",
  "枚举值": "枚举类型中定义的各个命名常量，如enum Color { RED, GREEN, BLUE };中RED、GREEN、BLUE即为枚举值。",
  "底层类型": "枚举类型在内存中实际存储的整数类型，传统enum的底层类型由编译器决定，enum class可显式指定（如enum class Color : char）。",
  "作用域枚举": "enum class将枚举值限制在枚举名的作用域内，访问时需加枚举名前缀（如Color::RED），避免命名冲突。",
  "C风格枚举": "传统enum，枚举值暴露在外部作用域，可隐式转换为整数，易出现命名冲突和意外转换。",
  "声明": "告诉编译器某个名字（变量、函数、类型）的存在及其类型，不分配内存，可以出现多次。",
  "定义": "为变量分配内存、为函数提供实现，定义只能出现一次（同一翻译单元内），是声明的一种。",
  "extern": "C++关键字，用于声明一个变量或函数是在其他翻译单元中定义的，当前文件只做引用不分配内存。",
  "声明多次": "同一名字的声明可以出现多次（只要不冲突），头文件中的函数声明在多个.cpp中被包含是常见的合法操作。",
  "定义一次": "同一实体（变量、函数）在整个程序中只能有一处定义，这是ODR（单一定义规则）的核心要求。",
  "变量声明": "用extern关键字声明变量而不定义它，如extern int g_var;告诉编译器g_var在其他文件中定义。",
  "分离编译基础": "声明与定义分离是分离编译的基础，头文件放声明，多个.cpp各自编译，最后链接在一起。",
  "变量初始化": "在创建变量时赋予其一个初始值，C++中初始化和方式有多种：直接初始化、拷贝初始化、列表初始化等。",
  "未初始化风险": "局部变量如果未初始化就读取值，其内容是未定义的（垃圾值），会导致程序行为不可预测，是重要的bug来源。",
  "尽量初始化": "良好的编程习惯，定义变量时尽量同时初始化，防止使用未初始化变量导致的错误。",
  "const变量": "用const修饰的变量，定义后不能修改其值，必须在定义时初始化，是命名常量的推荐方式。",
  "变量作用域": "变量在程序中可被访问的代码区域，C++有全局作用域、局部作用域、类作用域、命名空间作用域等。",
  "最小作用域原则": "变量应在最靠近使用位置的最小作用域内定义，减少名字冲突，提高代码可读性。",
  "ODR": "One Definition Rule，单一定义规则，C++规定同一实体（类、函数、变量等）在整个程序中只能有一处定义。",
  "One Definition Rule": "ODR的英文全称，是C++链接和分离编译的核心规则。",
  "多次声明一次定义": "ODR的通俗表述：同一名字可以声明多次，但只能定义一次。",
  "inline变量": "C++17引入的特性，允许在头文件中定义inline变量，多个翻译单元包含时不会违反ODR。",
  "跨编译单元": "ODR规则适用于整个程序（所有编译单元），即使变量定义在某个.cpp中，其他单元也不得重复定义。",
  "存储期": "对象在内存中存活的时间段，C++有四种存储期：自动、静态、动态、线程。",
  "自动存储期": "局部变量（在栈上分配）的存储期，进入作用域时创建，离开作用域时自动销毁。",
  "静态存储期": "全局变量、静态成员变量、静态局部变量的存储期，程序启动时分配，程序结束时才释放，生存周期贯穿整个程序运行期。",
  "动态存储期": "通过new/delete在堆上手动管理的对象的存储期，由程序员控制分配和释放时机。",
  "线程存储期": "C++11引入thread_local关键字，具有此存储期的变量每个线程各有一份独立副本，线程结束时销毁。",
  "作用域": "名字在程序中可被直接访问的区域，与作用域不同，链接性描述名字能否被其他翻译单元看到。",
  "链接性": "Linkage，描述名字（函数、变量）在多个翻译单元之间是否可见，分为外部链接、内部链接、无链接三种。",
  "全局变量": "定义在函数外部的变量，具有静态存储期和外部链接性，整个程序都能访问，但过度使用会导致代码高度耦合、难以测试。",
  "局部变量": "函数体内定义的临时变量，如果其类型是某个类，则该函数所在类对该类产生依赖关系。",
  "static": "C++关键字，用于修改变量的存储期或控制名字的链接性：修饰全局变量/函数时限制为内部链接，修饰局部变量时变为静态存储期，修饰类成员时变为类成员。",
  "表达式": "由运算符和操作数组成的代码片段，每个表达式都有值和类型，C++中表达式可产生左值或右值。",
  "运算符优先级": "当表达式中有多个运算符时，优先级决定哪个运算符先执行，掌握优先级是编写正确表达式的基础。",
  "左值": "Lvalue，能出现在赋值号左边的表达式，代表一个持久的对象（有名字、有地址），如变量名、解引用指针等。",
  "右值": "Rvalue，只能出现在赋值号右边的表达式，代表临时对象或字面值（即将销毁），如字面量、临时对象、move结果等。",
  "类型转换": "将一种类型的值转换为另一种类型，C++支持隐式转换（自动发生）和显式转换（程序员指定）。",
  "隐式转换": "编译器自动进行的类型转换，如int到double、派生类指针到基类指针等，有时会导致意料之外的行为。",
  "显式转换": "程序员通过类型转换运算符明确指定的类型转换，C++推荐使用四种cast运算符替代C风格转换。",
  "副作用": "表达式求值过程中除了产生值以外对程序状态造成的任何可观察的改变，如修改变量、执行I/O等操作。",
  "指针": "存储内存地址的变量，通过指针可间接访问其指向的对象，C++中最强大也最容易出错的特性之一。",
  "地址": "内存中字节的编号，指针变量的值就是其所指向对象的内存首地址。",
  "解引用": "通过*运算符访问指针所指向的对象，如int* p = &x; int v = *p;中*p即为解引用操作。",
  "空指针": "不指向任何有效对象的指针，C++11起推荐使用nullptr表示空指针，替代NULL和0。",
  "nullptr": "C++11引入的空指针常量，类型为nullptr_t，可隐式转换为任意指针类型，比NULL更安全。",
  "野指针": "指向已释放或无效内存的指针，使用野指针会导致未定义行为，是C++常见bug来源。",
  "指针运算": "对指针进行加减整数操作，移动指针指向的位置，如p+1使指针指向下一个同类型对象。",
  "指针与数组": "数组名在大多数情况下会隐式转换为指向首元素的指针，指针运算和数组下标访问本质上是等价的。",
  "数组": "由同种类型的多个元素在连续内存中依次排列而成的数据结构，元素个数在编译期或运行期确定。",
  "下标": "通过[]运算符访问数组中指定位置的元素，如arr[3]访问arr的第4个元素（下标从0开始）。",
  "数组名即指针": "数组名在表达式中会隐式转换为指向首元素的指针（有少数例外，如sizeof(arr)中的arr）。",
  "越界访问": "访问数组时使用的下标超出了合法范围（0到size-1），导致未定义行为，是严重的安全漏洞来源。",
  "多维数组": "数组的数组，如int arr[3][4]表示3行4列的整数矩阵，内存中按行优先顺序存储。",
  "数组与指针关系": "C++中数组和指针密切相关：数组名可转为指针、指针支持下标运算、动态数组通过指针管理。",
  "C风格字符串": "以空字符（'\\0'）结尾的char数组，如char s[] = \"hello\";，C++中更推荐使用std::string。",
  "引用": "为已有对象起的别名，引用和原对象指向同一块内存，修改引用即修改原对象。",
  "左值引用": "C++11之前的普通引用，绑定到左值（持久对象），声明时必须初始化且不能重新绑定。",
  "引用必须初始化": "引用是别名，必须在定义时绑定到某个对象，不存在\"空引用\"，这是引用与指针的重要区别。",
  "引用与指针区别": "引用必须初始化、不能重新绑定、不占独立存储、语法上像对象本身；指针可为空、可重新赋值、占独立存储、需解引用访问。",
  "别名": "引用的本质含义，引用不是新对象，而是已有对象的另一个名字，对引用的所有操作都直接作用于原对象。",
  "参数传递": "函数调用时实参到形参的传递方式，C++支持按值传递、按指针传递、按引用传递。",
  "宏": "通过#define定义的标识符或带参数的代码片段，预处理器进行简单文本替换，功能强大但易出错。",
  "宏函数": "带参数的宏，如#define MAX(a,b) ((a)>(b)?(a):(b))，看起来像函数但本质是文本替换，需注意副作用。",
  "宏参数": "宏定义中的形式参数，如#define ADD(x,y) x+y中的x和y，调用时实参会进行文本替换（不求值）。",
  "宏副作用": "宏参数如果包含带有副作用的表达式（如++、--），会因文本替换而导致表达式被求值多次，产生错误结果。",
  "宏与内联函数": "内联函数（inline）是宏函数的安全替代方案，支持类型检查、无副作用，C++中应优先使用内联函数。",
  "条件编译宏": "用于条件编译的宏，通过#ifdef、#ifndef等指令控制代码是否参与编译，常用于跨平台开发和调试。",
  "命名常量": "有名字的常量，C++中推荐使用const或constexpr定义命名常量，替代#define宏常量。",
  "const": "C++关键字，用于定义常量或限定指针/引用的访问权限，是C++类型系统的重要组成部分。",
  "#define vs const": "#define宏常量无类型、不占存储、不提供类型安全；const常量有类型、可调试、提供类型检查，推荐优先使用const。",
  "类型安全": "编程语言防止类型错误的机制，const、enum class、模板等C++特性都能提高类型安全性，减少运行时错误。",
  "常量折叠": "编译器优化技术，对于const变量在使用处直接用其值替换，避免内存访问，提高运行效率。",
  "const pointer": "有两个相关但不同的概念：pointer to const（指向常量的指针）和const pointer（常量指针，指针本身不可改变）。",
  "pointer to const": "指向常量的指针，不能通过此指针修改所指对象的值，但指针本身可以改变指向，如const int* p = &x;。",
  "常量指针": "指针本身是常量，定义后不能改变其指向的地址，但可以通过它修改所指对象（如果对象不是const），如int* const p = &x;。",
  "指向常量的指针": "即pointer to const，强调不能通过指针修改对象，常用于函数参数以保护实参不被意外修改。",
  "顶层const": "Top-level const，表示指针/对象本身是常量，如int* const、const int。顶层const在拷贝时不受影响。",
  "底层const": "Low-level const，表示指针/引用指向的对象是常量，如const int*、const int&。底层const在拷贝时要求两边类型匹配。",
  "const int*": "指向const int的指针（pointer to const），不能通过此指针修改int的值，指针本身可以改变指向。",
  "int* const": "指向int的常量指针，指针本身不可改变指向，但可以通过它修改int的值。",
  "const引用": "绑定到const对象的引用，不能通过const引用修改对象的值，但引用可以绑定到临时对象（普通引用不行）。",
  "常引用": "即const引用，常用来作为函数参数类型，既可以接受左值也可以接受右值，同时保护实参不被修改。",
  "引用传递": "函数参数按引用传递，函数内对形参的修改直接影响实参，避免了大型对象的拷贝开销。",
  "避免拷贝": "C++中传递大型对象（如大数组、大字符串）时，使用引用或指针传递可避免昂贵的拷贝操作，提高性能。",
  "临时对象绑定": "const引用可以绑定到临时对象（右值），延长其生命周期，这是C++中const引用的重要特性。",
  "const形参": "函数参数声明为const引用或const指针，承诺不修改实参，使调用者放心传入对象，也支持传入const对象。",
  "返回类型": "函数签名的一部分，指定函数执行完毕后返回的值的类型，可以是内置类型、类类型、引用、指针等。",
  "参数列表": "函数签名的一部分，指定函数接受的参数的类型和顺序，C++支持默认参数和函数重载。",
  "函数名": "函数的标识符，通过函数名和参数列表（重载决议）来确定调用哪个具体函数。",
  "前置声明": "在函数定义之前声明其原型，使函数在定义之前就可以被调用，常用于解决互相调用的函数间的顺序问题。",
  "函数调用": "通过函数名和实际参数执行函数的过程，调用时程序控制权转移到函数体，执行完毕后返回调用点。",
  "栈帧": "函数调用时在栈上分配的一块内存区域，用于存储函数的局部变量、参数、返回地址等，函数返回时栈帧自动释放。",
  "参数压栈": "函数调用时将实参的值按顺序压入栈中的过程，具体顺序和方式由调用约定决定。",
  "返回地址": "函数调用指令的下一条指令的地址，被保存在栈帧中，函数执行完毕后通过返回地址回到调用点继续执行。",
  "调用约定": "规定函数调用时参数传递顺序、栈清理责任等细节的协议，不同平台和编译器支持不同的调用约定。",
  "栈溢出": "函数递归过深或分配超大局部变量导致栈空间耗尽，触发程序崩溃，是常见的安全漏洞（栈溢出攻击）基础。",
  "递归调用": "函数直接或间接调用自身，必须有终止条件，否则会导致无限递归和栈溢出。",
  "__cdecl": "C/C++默认的调用约定，参数从右向左压栈，调用者负责清理栈，支持可变参数函数（如printf）。",
  "__stdcall": "Windows API常用的调用约定，参数从右向左压栈，被调用者负责清理栈，不支持可变参数。",
  "__fastcall": "通过寄存器传递部分参数的调用约定，旨在减少栈操作开销，提高函数调用速度。",
  "参数传递顺序": "调用约定规定的实参入栈顺序，__cdecl和__stdcall都是从右向左，这与可变参数函数的实现有关。",
  "栈清理": "函数调用完毕后清理栈中参数所占空间的操作，由调用者清理（__cdecl）或被调用者清理（__stdcall）。",
  "名称修饰": "Name Mangling，编译器将函数名、参数类型等信息编码为链接符号名的过程，支持C++函数重载。",
  "函数重载": "编译期多态的一种，同一作用域内定义多个同名函数，参数类型或个数不同，编译器根据调用实参在编译期选择最匹配版本。",
  "重载决议": "Overload Resolution，编译器在重载函数集合中确定哪一个最符合调用实参的过程，考虑隐式类型转换代价。",
  "参数类型不同": "函数重载的核心条件之一，参数类型不同即可构成重载，仅有返回类型不同不构成合法重载。",
  "参数个数不同": "函数重载的另一条件，参数个数不同（如void f(int)和void f(int, int)）可构成合法重载。",
  "返回类型不参与重载": "C++规定仅凭返回类型不同不能构成函数重载，因为调用时可以不使用返回值，编译器无法区分。",
  "默认参数": "声明函数时给参数指定默认值，调用时若省略该实参则使用默认值，默认参数必须从右向左连续设置。",
  "缺省参数": "同默认参数，\"缺省\"是台湾地区对default的译法，大陆通常称\"默认参数\"。",
  "函数默认值": "默认参数的具体值，必须是编译期可知的常量或全局变量，不能在函数定义和声明中同时指定默认值。",
  "参数顺序": "默认参数必须从参数列表的最右端开始向左连续设置，调用时只能从最右端开始省略实参。",
  "默认参数位置": "C++规定默认参数只能在函数声明中指定（通常在头文件），不能在定义中重复指定。",
  "省略参数": "调用带有默认参数的函数时，可以省略部分实参，使用默认值替代。",
  "返回值": "函数执行完毕后返回给调用者的值，返回类型必须与函数声明的返回类型兼容。",
  "返回引用": "operator=、operator+=等运算符通常返回当前对象的引用（T&），以支持链式调用和符合内置类型的直觉行为。",
  "返回指针": "函数返回指针类型，常用于返回动态分配的对象或数组首地址，但需注意内存管理责任。",
  "返回值优化": "RVO/NRVO，编译器优化技术，通过直接在调用者提供的空间中构造返回值对象，避免不必要的拷贝，提高性能。",
  "RVO": "Return Value Optimization，返回值优化，当函数按值返回一个临时对象时，编译器可省略拷贝构造的优化。",
  "NRVO": "Named Return Value Optimization，具名返回值优化，即使返回的是有名字的局部对象，编译器也可进行RVO优化。",
  "临时对象": "表达式求值过程中产生的中间对象，没有名字，通常是右值，在完整表达式结束时销毁。",
  "移动语义": "C++11引入的特性，通过\"偷\"临时对象的资源而非拷贝，大幅提高返回大型对象时的性能，核心机制是右值引用和std::move。",
  "类即类型": "在C++中，class定义的本质是定义一种新的类型，这种类型可以像内置类型一样使用，支持运算符重载等定制行为。",
  "接口": "类对外提供的可被访问的操作集合，通常是public成员函数，描述了\"这个类能做什么\"。",
  "实现隐藏": "同信息隐蔽，通过private访问控制和分离编译（.h声明/.cpp实现）来实现。",
  "class vs struct": "C++中class和struct几乎完全相同，唯一区别是默认访问权限：class默认private，struct默认public。",
  "class定义": "用class关键字定义用户类型，格式为class 类名 { 访问说明符: 成员... };，定义不分配内存。",
  "成员": "类中包含的元素，包括数据成员（变量）和成员函数（方法），以及类型成员（如嵌套类）。",
  "数据成员": "类中定义的变量，每个类对象都拥有独立的数据成员副本（static成员除外），用于存储对象的状态。",
  "成员函数": "类中定义的函数，用于操作类的数据成员，成员函数有一个隐式的this指针指向调用该函数的对象。",
  "访问说明符": "public、private、protected三个关键字，用于控制类中成员的访问权限，可以出现多次，每次改变后续的访问级别。",
  "public": "访问说明符，标记为public的成员可被任意代码访问，通常放置类的接口（成员函数）。",
  "private": "访问说明符，标记为private的成员只能被该类的成员函数访问，用于隐藏实现细节。",
  "struct默认public": "用struct定义类型时，首个访问说明符之前的成员默认为public，而class默认为private。",
  "静态成员": "用static修饰的类成员，不依赖于对象而存在，可通过类名直接访问，常用于实现类级别的共享数据或工具函数。",
  "常量成员": "类中的const成员，必须在构造函数的初始化列表中初始化，一旦初始化后在其生命周期内不能被修改。",
  "成员访问运算符": "用于访问类对象成员的运算符，.用于对象本身，->用于指向对象的指针。",
  "点运算符": "即.运算符，通过对象本身访问其public成员，如myObj.f();。",
  "箭头运算符": "即operator->，返回一个指针（或另一个重载了->的对象），C++会递归调用直到获取到真正的指针。",
  "类": "用户定义类型的蓝图，描述了数据成员和成员函数的集合，类定义本身不分配内存，只有通过类实例化出对象后才分配。",
  "对象": "类的具体实例，是内存中的一块区域，存储着类的数据成员，每个对象有独立的状态。",
  "实例化": "通过类创建具体对象的过程，如MyClass obj;即用MyClass类实例化出一个名为obj的对象。",
  "类定义不分配内存": "class MyClass {...};只是定义了一个类型，不产生任何内存分配，只有定义对象（如MyClass obj;）时才分配内存。",
  "对象分配内存": "定义对象时为该对象分配足够存储所有非static数据成员的内存空间，此外可能还有vptr（如果类有虚函数）。",
  "消息传递": "面向对象中对象之间通过调用方法来进行交互的方式，即\"向对象发送消息\"，对应C++中的成员函数调用。",
  "对象内存布局": "对象在内存中的排列方式，非static数据成员按其声明顺序依次排列，可能因内存对齐而插入填充字节。",
  "内存对齐": "CPU访问内存时要求数据起始地址是特定值的倍数（如4、8、16），编译器会自动在结构体成员之间插入填充字节（padding）以满足对齐要求，影响sizeof的结果。",
  "padding": "内存对齐时插入的填充字节，不存储有效数据，仅用于满足对齐要求，会导致对象的实际大小大于各成员大小之和。",
  "数据成员大小": "对象中各个数据成员各自占用的字节数，取决于其类型和对齐要求。",
  "空类大小": "没有任何数据成员（也没有虚函数）的类实例化出的对象的大小，C++规定不能为0，通常为1字节（用于区分不同对象）。",
  "成员函数不占空间": "普通成员函数不存储在对象本身的内存中，所有对象共享同一份成员函数代码，因此sizeof(对象)不包含成员函数。",
  "成员函数定义": "在类外定义成员函数时，必须使用作用域解析符::指明该函数属于哪个类，如void MyClass::f() { ... }。",
  "类内定义": "在class定义体内部直接写出成员函数的函数体，类内定义的函数默认被视为inline函数。",
  "类外定义": "在class定义体外部定义成员函数，需在函数名前加类名::，类外定义默认不是inline（除非显式加inline）。",
  "作用域解析符": "即::运算符，用于指定某个名字属于哪个作用域，最常用的是在类外定义成员函数时指定类名。",
  "成员函数访问成员": "成员函数可直接访问同类对象的任何成员（不论public/private），因为访问控制是在类级别而非对象级别生效的。",
  "this指针": "每个非static成员函数都隐式拥有的指针参数，指向调用该函数的那个对象，在成员函数内部可通过this->访问成员（通常可省略）。",
  "隐式参数": "this指针是编译器自动传递给成员函数的隐式参数，程序员看不到但可以在函数体内使用this来引用。",
  "当前对象地址": "this指针的值，即调用成员函数的那个对象在内存中的地址。",
  "链式调用": "成员函数返回*this（当前对象的引用）时，可以在一条语句中连续调用多个成员函数，如obj.setX(1).setY(2).setZ(3);。",
  "const this": "const成员函数的this指针类型实际上是const C* const this（指向常量的常量指针），不能通过它修改对象成员。",
  "内联函数": "用inline关键字建议编译器的函数，编译器尝试将函数调用处直接替换为函数体，消除函数调用开销，适用于短小频繁调用的函数。",
  "inline": "C++关键字，建议编译器将函数内联展开，编译器可自行决定是否采纳此建议。",
  "外联": "与内联相对，指函数调用通过正常的调用机制（压栈、跳转、返回）执行，有函数调用开销。",
  "内联展开": "编译器将内联函数的函数体直接插入到调用处，消除了函数调用的开销，但可能增加可执行文件体积。",
  "函数调用开销": "函数调用时产生的额外代价：参数压栈、跳转、返回地址保存、栈帧创建与销毁等，对频繁调用的小函数影响较大。",
  "头文件内定义": "在头文件中定义（而非仅声明）函数，通常需要加inline关键字，否则多个翻译单元包含该头文件会导致重定义错误。",
  "inline建议": "inline关键字只是向编译器提建议，编译器可根据函数复杂度自行决定是否内联，C++17起inline函数可在头文件中定义而无需担心ODR。",
  "访问控制": "通过public/private/protected控制类成员的可见性，是封装的实现手段。",
  "protected": "访问说明符，标记为protected的成员可被该类及其派生类的成员函数访问，但不能被外部代码访问。",
  "封装性": "通过访问控制隐藏实现细节的程度，良好的封装性要求数据成员设为private，通过public成员函数提供受控访问。",
  "接口公开": "将类中对外部有用的操作声明为public，形成类对外承诺的接口，调用者依赖接口而非实现。",
  "数据隐藏": "将类的数据成员声明为private，防止外部代码直接访问和修改对象内部状态，保证对象一致性。",
  "类内访问不受限": "在同一个类的不同对象之间，一个对象的成员函数可以直接访问另一个同类对象的private成员，因为访问控制是基于类而非对象的。",
  "信息隐蔽": "Information Hiding，将类的实现细节对使用者隐藏，只暴露稳定接口，修改实现不影响使用者代码，是封装的目的。",
  "修改实现不影响使用": "信息隐蔽的核心价值，只要接口不变，类的内部实现可以自由修改和优化，使用者代码无需重新编译。",
  "黑盒": "比喻信息隐蔽的效果，使用者只需知道\"输入什么、得到什么\"，无需了解内部\"怎么实现\"。",
  "getter/setter": "用于访问private数据成员的public成员函数，getter返回成员值，setter设置成员值，可在setter中加入合法性检查。",
  "const成员函数": "用const修饰的成员函数，承诺不修改对象的状态（mutable成员除外），const对象只能调用const成员函数。",
  "常函数": "即const成员函数，函数参数列表后的const修饰符表示该函数不会修改对象（除mutable外）。",
  "this指针为const": "const成员函数中的this指针是指向const对象的指针，无法通过this修改对象任何非mutable成员。",
  "不能修改成员": "const成员函数体内不能赋值给非mutable的数据成员，也不能调用非const的成员函数。",
  "const对象只能调用const函数": "用const修饰的对象，只能调用其const成员函数，因为非const成员函数可能会修改对象。",
  "mutable": "C++关键字，修饰类的数据成员，即使在const成员函数中也可以修改mutable成员，常用于缓存、计数器等场景。",
  "实例变量": "即非static数据成员，每个对象实例拥有独立的一份，实例变量的值在各对象间相互独立。",
  "实例方法": "即非static成员函数，必须通过具体的对象来调用，内部有this指针指向调用对象。",
  "类变量": "即static数据成员，被所有类对象共享，不属于任何具体实例，必须在类外单独定义和初始化。",
  "类方法": "即static成员函数，没有this指针，只能访问static成员和其他static成员函数，常用于工厂方法、工具函数等。",
  "静态成员函数": "用static修饰的成员函数，不依赖于对象，可通过类名::直接调用，常用于操作类级别的资源。",
  "不依赖对象": "static成员函数可在不创建任何对象的情况下调用，因为它没有this指针，也不访问非static成员。",
  "完整类设计": "设计一个类时需要综合考虑：数据成员、成员函数、构造函数、析构函数、拷贝控制、运算符重载、访问控制等各个方面。",
  "Card类": "课程中的综合案例，设计一个代表扑克牌的Card类，包含花色、点数等数据成员和相应的成员函数。",
  "综合案例": "将多个知识点综合运用的编程实例，帮助理解各知识点之间的联系和实际应用。",
  "构造函数": "与类名同名、无返回类型的特殊成员函数，在对象创建时自动调用，用于初始化对象的状态。",
  "构造器": "即构造函数（Constructor），负责\"构造\"对象，确保其在使用前处于有效状态。",
  "函数名与类名相同": "构造函数的语法特征，函数名必须和所在类的类名完全一致（包括大小写）。",
  "无返回类型": "构造函数没有返回类型（连void都没有），这是它与普通函数的重要区别。",
  "初始化成员": "构造函数的核心任务，在函数体中或通过初始化列表为数据成员赋予初始值。",
  "初始化列表": "构造函数参数列表后、函数体前以冒号开头的成员初始化语法，格式为: 成员1(值1), 成员2(值2)...，比在函数体内赋值更高效。",
  "重载构造函数": "一个类可以有多个构造函数，只要参数类型或个数不同，创建对象时根据实参匹配最合适的构造函数。",
  "缺省构造函数": "又称默认构造函数，指可无参调用的构造函数。若类中没有定义任何构造函数，编译器会自动生成一个缺省构造函数（但行为有限）。",
  "默认构造": "同缺省构造函数，C++11可用=default显式要求编译器生成默认构造函数。",
  "无参构造": "不需要参数的构造函数，可以是编译器自动生成的，也可以是程序员定义的。",
  "编译器生成": "当程序员没有定义某些特殊成员函数时，编译器会自动生成其默认版本（C++11规则），但生成是有条件的。",
  "有自定义构造则无默认": "如果类中定义了任何构造函数（无论是否带参数），编译器不再自动生成缺省构造函数，需要的话必须显式定义或=default。",
  "=default": "C++11引入的语法，显式告诉编译器生成该函数的默认版本，常用于恢复被抑制的默认构造函数、拷贝构造等。",
  "成员初始化": "通过初始化列表或构造函数体为数据成员赋予初值，引用成员和const成员必须通过初始化列表初始化。",
  "构造初始化列表": "同初始化列表，在构造函数中初始化成员的首选方式，对于const成员、引用成员、没有默认构造的成员变量必须通过初始化列表初始化。",
  "引用成员必须初始化": "引用必须在定义时绑定到对象，而引用的\"定义\"发生在对象构造时，因此引用成员必须通过初始化列表初始化。",
  "const成员初始化": "const数据成员必须在对象构造时初始化，且之后不能修改，因此也必须通过初始化列表初始化。",
  "初始化顺序": "数据成员的初始化顺序只与其在类中声明的顺序有关，与初始化列表中的书写顺序无关，需注意初始化依赖。",
  "析构函数": "在类名前加~的特殊成员函数，无参数无返回类型，在对象销毁时自动调用，用于释放资源。",
  "~类名": "析构函数的语法形式，如~MyClass()，波浪号+类名。",
  "对象销毁": "对象生命周期结束时，其占用的内存被回收。对于栈对象，离开作用域时自动销毁；对于堆对象，需显式delete触发。",
  "释放资源": "析构函数的核心职责，如释放动态分配的内存、关闭打开的文件、释放锁等，防止资源泄漏。",
  "RAII": "Resource Acquisition Is Initialization，C++的核心惯用法：在构造函数中获取资源，在析构函数中释放资源，将资源生命周期绑定到对象生命周期。",
  "栈对象自动析构": "定义在栈上的局部对象，离开其作用域时会自动调用析构函数，无需手动管理，是RAII的基础。",
  "堆对象需delete": "通过new在堆上创建的对象，不会自动销毁，必须显式调用delete触发析构函数，否则会导致内存泄漏。",
  "构造私有化": "将构造函数声明为private，使该类不能在栈上直接实例化，常用于实现单例模式（只能通过静态成员函数创建对象）。",
  "单例模式": "设计模式之一，保证一个类只有一个实例，并提供一个全局访问点，通过将构造函数私有化、提供静态getInstance方法实现。",
  "禁止继承": "将类声明为final（C++11）可使该类不能被继承，或将构造函数私有化来间接阻止继承。",
  "抽象类不能实例化": "含有纯虚函数的类是抽象类，不能直接创建对象，只能作为基类被继承，派生类必须实现所有纯虚函数后才能实例化。",
  "protected构造": "将构造函数声明为protected，该类不能在自己的类外直接实例化，但可以被派生类在其构造函数中调用（用于基类部分构造）。",
  "工厂模式": "设计模式之一，将对象的创建逻辑封装在工厂类中，调用者无需知道具体类名，只需通过工厂获取对象，降低耦合。",
  "对象拷贝": "用一个已有对象初始化另一个同类对象，C++中通过拷贝构造函数实现，按值传参也会触发对象拷贝。",
  "拷贝构造": "一种特殊的构造函数，参数为同类对象的const引用（如MyClass(const MyClass&)），用于拷贝初始化对象。",
  "浅拷贝问题": "只拷贝指针成员的值（地址），不拷贝指针指向的实际内容，导致两个对象共享同一块内存，引发双重释放等问题。",
  "深拷贝": "为指针成员重新分配内存并复制内容（而非仅复制地址），使两个对象各自拥有独立资源，是正确管理动态资源的关键。",
  "拷贝语义": "C++中对象拷贝的行为规范，包括拷贝构造函数和拷贝赋值运算符，共同决定\"如何复制一个对象\"。",
  "按值传参触发拷贝": "函数参数为非引用类型时，实参到形参的传递会调用拷贝构造函数（或移动构造函数，C++11起），有性能开销。",
  "默认拷贝构造": "当程序员未定义拷贝构造函数时，编译器自动生成的一个，执行逐成员拷贝（shallow copy）。",
  "逐成员拷贝": "编译器生成的默认拷贝构造的行为：对各个非static数据成员依次调用其拷贝构造（或按位拷贝内置类型）。",
  "指针成员风险": "类中含有指针成员时，使用默认拷贝构造（浅拷贝）会导致多个对象共享同一块动态内存，析构时会双重释放。",
  "Rule of Three": "C++98/03的经验法则：如果一个类需要自定义析构函数、拷贝构造函数或拷贝赋值运算符中的任何一个，那么它大概率需要全部三个。",
  "指针共享": "浅拷贝的直接后果，两个对象的指针成员指向同一地址，任一方修改内容都会影响另一方，任一方析构后另一方指针悬空。",
  "双重释放": "两个对象共享同一块动态内存，各自析构时都尝试delete同一指针，导致未定义行为（通常程序崩溃）。",
  "内存泄漏": "动态分配的内存（通过new获取）在不再使用后未被delete释放，导致该块内存永远无法被再次分配和访问。",
  "悬空指针": "指针所指向的对象已被释放（delete），但指针本身还保存着旧地址，解引用悬空指针导致未定义行为。",
  "拷贝风险": "使用默认拷贝构造/赋值时，如果类管理动态资源，就会面临浅拷贝带来的双重释放、悬空指针等风险。",
  "自定义拷贝构造": "程序员显式定义的拷贝构造函数，通常实现深拷贝，为每个指针成员分配独立内存并复制内容。",
  "重新分配内存": "深拷贝的关键步骤，为指针成员分配新的内存块，大小与原对象指针指向的内容相同。",
  "独立资源": "深拷贝的目标，拷贝后的对象拥有与被拷贝对象完全独立的资源副本，修改互不影响，析构也互不影响。",
  "避免双重释放": "实现深拷贝的核心目的之一，确保每个对象只负责释放自己拥有的资源。",
  "拷贝构造参数const引用": "拷贝构造函数的参数必须是const引用（如const T&），原因：避免无限递归（按值传参会调用拷贝构造）、允许接受const对象和临时对象。",
  "赋值运算符": "即operator=，用于将一个已有对象的值赋给另一个已有对象，与拷贝构造不同在于对象已经存在。",
  "operator=": "C++中赋值运算符的关键字，可重载。默认operator=执行逐成员赋值（浅赋值），管理资源的类需要自定义。",
  "赋值与拷贝区别": "拷贝构造用于创建新对象（初始化），赋值运算符用于已有对象之间的赋值（对象已存在）。两者都需要注意深拷贝问题。",
  "自赋值检查": "自定义operator=时必须在开始检查是否self-assignment（如if(this == &other) return *this;），否则在释放旧资源后会访问已释放的内存。",
  "返回*this": "赋值运算符通常返回当前对象的引用（*this），以支持链式赋值（如a = b = c;）。",
  "链式赋值": "赋值表达式的返回值可以继续参与赋值，如a = b = c;等价于b = c; a = b;，要求operator=返回引用。",
  "重载赋值运算符": "自定义operator=的行为，管理资源的类需要自定义以实现深赋值，并注意自赋值和异常安全。",
  "处理自赋值": "在operator=函数体开头检查this != &other，若是自赋值则直接返回*this，避免释放自己的资源后再访问。",
  "释放旧资源": "自定义operator=的步骤：先分配新资源、再释放旧资源（或先释放旧资源再从other深拷贝——但异常安全版本应先分配再释放）。",
  "分配新资源": "operator=中先根据other的内容分配新资源，再释放旧资源，这样即使分配失败抛异常，原对象状态未被破坏（异常安全）。",
  "拷贝赋值": "即重载的operator=，对于管理资源的类必须自定义以实现深赋值，是Rule of Three中的第三个函数。",
  "运算符重载": "C++允许为类类型重新定义运算符的含义，通过成员函数或友元函数实现，使自定义类型能像内置类型一样使用运算符。",
  "operator关键字": "C++中用于定义运算符重载函数的关键字，语法为返回类型 operator运算符(参数列表) { ... }。",
  "不能重载的运算符": "C++规定以下运算符不能重载：.（成员访问）、.*（成员指针访问）、::（作用域解析）、?:（三元条件）、sizeof、typeid。",
  "重载限制": "运算符重载必须遵守的限制：不能发明新运算符（如operator**）、不能改变运算符的操作数个数、不能改变优先级和结合性。",
  "保持语义": "运算符重载的重要原则，重载后的行为应与运算符的内置语义一致（如operator+应返回和，不应做无关的事）。",
  "operator+": "最常见的重载运算符之一，实现两个对象的\"加法\"，通常作为成员函数或友元函数实现，返回新对象（而非引用）。",
  "二元运算符": "需要两个操作数的运算符，如+、-、*、/等。重载时可作为成员函数（左操作数为this）或友元函数（两个参数都显式）。",
  "友元重载": "将运算符重载为友元函数，适用于需要对称处理左右操作数的场景（如operator<<用于流输出，左操作数为ostream&）。",
  "成员函数重载": "在类内部定义运算符重载，此时左操作数是隐式的this指针，适用于赋值类运算符（如operator=、operator+=）。",
  "左操作数": "二元运算符左边的操作数，对于成员函数重载是隐式的this，对于友元重载是第一个显式参数。",
  "右操作数": "二元运算符右边的操作数，对于成员函数重载是显式参数，对于友元重载是第二个显式参数。",
  "成对重载": "重载比较运算符时应成对实现：重载了operator==就应同时重载operator!=，重载了operator<就应同时重载operator>、operator<=、operator>=，保持语义一致。",
  "operator==": "等于比较运算符，判断两个对象是否\"相等\"（语义上由类设计者定义），返回bool。常与operator!=成对重载。",
  "operator!=": "不等于比较运算符，通常直接返回!(*this == other)，与operator==成对实现。",
  "operator<": "小于比较运算符，常用于定义类型的\"全序\"关系，是STL容器和算法对元素排序的依据。",
  "operator>": "大于比较运算符，通常直接返回other < *this，与operator<成对实现。",
  "保持一致语义": "成对重载时的原则，operator==和operator!=的判断结果必须互补，operator<和operator>的结果必须一致。",
  "一元运算符": "只需要一个操作数的运算符，如++（递增）、--（递减）、*（解引用）、&（取地址）、!（逻辑非）、~（按位取反）等。",
  "operator++": "递增运算符，区分前置版本（++obj，返回递增后对象的引用）和后置版本（obj++，返回递增前的值，参数列表中有一个多余的int参数用于区分）。",
  "前置++": "++obj，先递增再返回对象的引用（T& operator++()），效率高（无临时对象）。",
  "后置++": "obj++，先保存原值，再递增，最后返回原值的副本（T operator++(int)），效率较低（有临时对象）。",
  "哑元参数": "后置++/--运算符重载函数中用于区分前置和后置的int类型参数，函数体中不需要使用它，只是语法上用来区分。",
  "operator--": "递减运算符，与operator++类似，也分前置和后置两个版本。",
  "取负": "一元负号运算符operator-，返回对象的负值副本，如复数类的operator-返回共轭复数。",
  "取反": "按位取反运算符operator~（针对整数类型），或逻辑非运算符operator!（返回bool）。",
  "operator[]": "下标运算符，通常用于让对象能像数组一样通过[]访问元素，必须作为成员函数重载，可区分const和非const版本以提供只读和读写两种访问。",
  "下标运算符": "即operator[]，标准库中std::vector、std::map、std::string等都重载了此运算符。",
  "operator()": "函数调用运算符，重载后对象可以像函数一样被\"调用\"（如obj(arg1, arg2)），这类对象称为函数对象（Functor）。",
  "函数对象/仿函数": "重载了operator()的类实例，行为类似函数，可捕获状态（比普通函数指针更灵活），是STL算法的重要搭档。",
  "operator->": "箭头运算符，重载后对象可以像指针一样使用->访问成员，常用于智能指针的实现。",
  "operator<<": "左移运算符，被重载用于输出流（如cout << obj;），左操作数为ostream&，必须作为友元函数重载。",
  "输出流": "通过重载operator<<实现，使自定义类型可以像内置类型一样使用cout输出，是C++优雅I/O的体现。",
  "operator>>": "右移运算符，被重载用于输入流（如cin >> obj;），左操作数为istream&，必须作为友元函数重载。",
  "输入流": "通过重载operator>>实现，使自定义类型可以从标准输入或文件流中读取数据。",
  "重载原则": "运算符重载设计时应遵循：保持与内置类型一致的直觉语义、不要改变操作数个数、注意返回值类型、成对实现比较运算符。",
  "保持直觉语义": "最重要的重载原则，operator+应该返回和、operator*应该返回积、operator<<应该用于输出，不要滥用运算符做无关的事。",
  "返回适当类型": "不同运算符有适当的返回类型：算术运算符返回新对象、赋值运算符返回引用、关系运算符返回bool、下标运算符返回引用。",
  "不发明新运算符": "C++不允许创造语言中不存在的运算符符号（如operator**），只能在已有运算符基础上重载。",
  "访问私有用友元": "当运算符的左操作数不是当前类的对象时（如operator<<的左操作数是ostream），需要在类中声明为友元函数来访问private成员。",
  "运算符重载最佳实践": "1. 保持语义直觉；2. 作为成员函数还是友元要选对；3. 注意返回类型；4. 成对实现；5. 考虑异常安全。",
  "内存布局": "程序运行时在内存中的组织方式，通常分为：代码段（存放程序指令）、数据段（全局/静态变量）、堆（动态分配）、栈（局部变量和函数调用）。",
  "代码段": "内存布局中的一段，存放程序的可执行机器指令，通常是只读的，防止程序意外修改自身指令。",
  "数据段": "内存布局中的一段，存放全局变量和静态变量，分为初始化数据段和未初始化数据段（BSS）。",
  "堆": "内存布局中用于动态分配的区域，由程序员通过new/delete手动管理，分配方式灵活但容易出错（内存泄漏、悬空指针等）。",
  "栈": "内存布局中用于函数调用和局部变量的区域，由编译器自动管理（进入作用域分配、离开释放），速度极快但大小有限。",
  "BSS段": "Block Started by Symbol，存放未初始化的全局变量和静态变量的区域，不占用可执行文件空间（运行时初始化为0）。",
  "内存地址空间": "程序看到的虚拟内存地址范围，32位系统通常为4GB，64位系统理论上为16EB（实际实现远小于此）。",
  "静态存储": "具有静态存储期的变量存在的形式，包括全局变量、静态全局变量、静态局部变量、类静态成员，在程序生命周期内持续存在。",
  "生命周期长": "静态存储期对象的特征，从程序启动到程序结束一直存在，不随作用域进出而创建/销毁。",
  "内存浪费": "过度使用静态存储的缺点，即使某个全局变量只在很短的时间内需要，它也会占用内存整个程序运行期。",
  "灵活性差": "静态存储的另一种缺点，内存分配在编译期确定，不能在运行时按需分配和释放。",
  "栈内存限制": "栈空间通常有限（Windows默认1MB，Linux默认8MB），分配超大局部变量或递归过深会导致栈溢出。",
  "new": "C++中用于在堆上动态分配单个对象的关键字，调用operator new分配内存，再调用构造函数初始化对象，失败时抛出std::bad_alloc异常。",
  "delete": "C++中用于释放由new分配的单对象的关键字，先调用析构函数，再调用operator delete释放内存。",
  "堆内存": "通过new从堆上分配的内存，由程序员手动管理生命周期，用完必须delete，否则内存泄漏。",
  "动态分配": "在程序运行时（而非编译时）根据需要分配内存，C++通过new/delete实现，是处理不确定大小数据的核心手段。",
  "new失败异常": "C++中new在无法分配所请求的内存时，默认抛出std::bad_alloc异常（而非返回nullptr），可用nothrow版本（new (std::nothrow) T）改为返回nullptr。",
  "重载new": "可以重载operator new（类的静态成员函数）来自定义内存分配行为，如实现内存池、使用共享内存、调试内存分配等。",
  "重载delete": "可以重载operator delete来自定义内存释放行为，通常与重载operator new配对使用。",
  "自定义内存分配": "重载operator new/delete的目的，可实现专属内存池（提高分配速度）、使用特殊内存区域（如共享内存）、加入分配日志等。",
  "内存池": "一种内存管理技术，预先分配一大块内存，之后从中分配和回收小块，避免频繁系统调用，大幅提高分配速度，是重载operator new的典型应用。",
  "placement new": "一种特殊的new语法：new (address) T(args)，在已分配的内存地址上构造对象（不分配新内存），常用于内存池、共享内存等场景。需要与显式调用析构函数配对使用。",
  "调试内存分配": "重载operator new时可在其中加入分配日志（如分配大小、调用栈、分配序号），帮助定位内存泄漏和非法访问。",
  "new[]": "C++中用于在堆上动态分配对象数组的关键字，分配时会在返回的指针之前存储数组大小（以便delete[]知道调用多少次析构函数）。",
  "delete[]": "用于释放由new[]分配的数组，必须与new[]配对使用。如果对数组用delete（而不是delete[]），行为是未定义的（通常只调用第一个元素的析构函数）。",
  "动态数组": "在运行时根据需要分配大小的数组，通过new[]创建，返回指向首元素的指针。C++11起推荐使用std::vector替代裸动态数组。",
  "数组释放": "释放动态数组必须用delete[]而非delete，否则行为未定义。编译器会在new[]时记录数组大小，delete[]据此调用正确次数的析构函数。",
  "不匹配后果": "new/delete、new[]/delete[]必须配对使用。用delete释放new[]分配的内存、或用delete[]释放new分配的单对象，都会导致未定义行为。",
  "析构调用次数": "delete[]时编译器知道数组有多少个元素（new[]时记录了大小），会对每个元素调用一次析构函数，然后释放整块内存。",
  "智能指针": "C++11引入的模板类，模拟指针的行为但自动管理所指向对象的内存释放，本质是利用RAII和析构函数自动delete。包括shared_ptr、unique_ptr、weak_ptr。",
  "shared_ptr": "共享所有权的智能指针，多个shared_ptr可以指向同一对象，通过引用计数管理生命周期，计数为0时自动释放对象。但要小心循环引用。",
  "unique_ptr": "独占所有权的智能指针，所指向的对象只能被一个unique_ptr拥有，不能拷贝只能移动（move语义），是替代裸指针管理动态内存的首选。",
  "weak_ptr": "C++11提供的弱引用智能指针，持有weak_ptr不会增加shared_ptr的引用计数，用于打破循环引用。访问对象时需先lock()获取shared_ptr。",
  "自动释放": "智能指针的核心价值，利用RAII原理，智能指针在析构时自动释放所管理的对象，程序员无需手动delete，彻底消除内存泄漏。",
  "所有权": "谁负责释放资源（谁拥有这块内存），是动态内存管理的核心概念。unique_ptr表达独占所有权、shared_ptr表达共享所有权、weak_ptr表达非拥有性引用。",
  "引用计数": "shared_ptr实现共享所有权的机制，记录当前有多少个shared_ptr指向同一对象，每次拷贝+1、每次析构-1，减到0时释放对象。",
  "shared_ptr实现": "通常包含一个指向管理对象的指针和一个指向控制块（control block）的指针，控制块中存储引用计数、自定义删除器、分配器等。",
  "计数增减": "shared_ptr拷贝构造时计数+1，shared_ptr析构或重置时计数-1。引用计数的增减必须是线程安全的（使用原子操作）。",
  "拷贝增加计数": "shared_ptr的拷贝构造函数将源shared_ptr控制块中的引用计数原子地加1。",
  "析构减少计数": "shared_ptr的析构函数将控制块中的引用计数原子地减1，如果减到0则释放管理对象和控制块。",
  "计数为0释放": "shared_ptr引用计数减到0时，先调用管理对象的析构函数，再释放管理对象的内存，最后释放控制块本身。",
  "线程安全引用计数": "shared_ptr的引用计数操作必须是原子操作，以保证多线程环境下多个shared_ptr拷贝/析构时的正确性。但shared_ptr对托管对象的访问本身并不保证线程安全。",
  "原子操作": "不可被中断的操作，C++11在<atomic>头文件中提供std::atomic模板，shared_ptr的引用计数内部使用原子操作保护。",
  "循环引用": "两个或多个对象通过shared_ptr互相引用，导致引用计数永远无法降到0，内存泄漏。典型场景：父子节点互相持有shared_ptr。",
  "打破循环引用": "使用weak_ptr替代可能导致循环的shared_ptr引用，这样循环链中的引用计数可以正常降到0，对象被正确释放。",
  "引用计数缺陷": "引用计数方式的主要缺点：1. 循环引用导致泄漏（需用weak_ptr解决）；2. 原子操作有性能开销；3. 控制块需要额外内存。",
  "内存碎片": "频繁分配和释放不同大小的内存块后，堆上出现大量无法利用的小空闲块，导致虽然有总空闲内存但无法分配大块连续内存的现象。",
  "内存泄漏检测": "通过工具（如Valgrind、Visual Leak Detector、ASan）在运行时检测程序中未释放的动态内存，帮助定位内存泄漏的源头。",
  "valgrind": "Linux下强大的内存调试和性能分析工具套件，其中Memcheck工具可检测内存泄漏、非法访问、使用未初始化内存等问题。",
  "智能指针最佳实践": "优先使用unique_ptr（独占所有权，零开销）；需要共享所有权时才用shared_ptr；用weak_ptr打破循环引用；避免对智能指针使用get()后手动delete。",
  "转换函数": "一种特殊的成员函数，格式为operator 目标类型()，无返回类型声明，用于定义从当前类类型到目标类型的隐式或显式转换。",
  "operator 类型": "转换函数的语法形式，如class A { operator int() const { return val; } };，允许A类型对象隐式转换为int。",
  "隐式类型转换": "编译器自动插入的类型转换，如将int传递给接受double的函数时自动转换。转换函数可能导致意外的隐式转换，应谨慎使用或用explicit修饰。",
  "explicit": "C++关键字，修饰构造函数或转换函数，禁止编译器使用该构造函数/转换函数进行隐式类型转换，只能通过显式构造/转换调用。",
  "避免意外转换": "使用explicit关键字防止编译器利用单参数构造函数或转换函数进行非预期的隐式类型转换，是提高代码安全性的重要手段。",
  "转换运算符": "即转换函数，重载了\"类型转换运算符\"，使自定义类型可以像内置类型一样参与类型转换。",
  "命名冲突": "不同命名空间或作用域中定义了相同名字，导致引用时产生二义性的问题。C++用namespace解决全局命名冲突。",
  "名字空间动机": "C++引入namespace的主要动机：大型项目中不同库可能定义了同名函数/类，需要一种机制将名字隔离到不同作用域中。",
  "全局命名污染": "所有名字都定义在全局作用域中，导致名字冲突概率极高，是C语言大型项目的主要问题之一。",
  "C++解决冲突": "C++通过namespace提供命名隔离、通过inline namespace提供版本控制、通过匿名namespace提供文件局部名字，多机制解决命名冲突。",
  "模块化": "将程序分解为独立、低耦合的模块（如不同namespace、不同库），各模块通过明确定义的接口交互，提高可维护性。",
  "namespace": "C++关键字，用于定义命名空间，将一组相关的名字隔离在一个独立的作用域中，避免全局命名冲突。",
  "定义命名空间": "语法：namespace 空间名 { // 内容 }；可以嵌套定义（namespace A { namespace B { ... } }），C++17起支持嵌套简写（namespace A::B { ... }）。",
  "嵌套命名空间": "在一个namespace内部定义另一个namespace，用于更细粒度的名字隔离，访问内层需用::限定（如A::B::name）。",
  "匿名命名空间": "没有名字的namespace（namespace { ... }），其中的名字具有内部链接性（仅当前翻译单元可见），是C++中替代static关键字的推荐方式。",
  "避免名称冲突": "使用namespace、避免using namespace std;、使用描述性强的名字，都是避免名称冲突的实践。",
  "std命名空间": "C++标准库中的所有名字都定义在std命名空间中，使用标准库内容时需加std::前缀，或通过using声明引入。",
  "using声明": "格式为using 空间名::名字;，将命名空间中的某个特定名字引入当前作用域，比using namespace更安全（只引入需要的名字）。",
  "using指令": "格式为using namespace 空间名;，将指定命名空间中的所有名字全部引入当前作用域，方便但易造成命名污染，不推荐在头文件中使用。",
  "using namespace std": "将std命名空间所有名字引入当前作用域，编写Hello World等小例子时方便，但在头文件或大型项目中应避免使用。",
  "名字汇入": "通过using声明或using指令将其他命名空间的名字引入当前作用域，减少::限定符的重复书写。",
  "选择性引入": "推荐使用using声明（引入特定名字）而非using指令（引入全部名字），只引入需要的名字，降低命名冲突风险。",
  "避免滥用using": "using namespace应在.cpp文件中有限使用，避免在头文件中使用，避免在同一定义作用域中using多个大命名空间。",
  "友元": "friend关键字修饰的函数或类，可访问当前类的private和protected成员，是对封装的有控制地\"打破\"。",
  "friend": "C++关键字，用于声明友元函数、友元类或友元成员函数，被声明为友元的实体可访问当前类的所有成员。",
  "友元函数": "在类中声明为friend的非成员函数，可访问该类的private成员，常用于需要对称处理左右操作数的运算符重载（如operator<<）。",
  "友元类": "在A类中声明friend class B;，则B类的所有成员函数都可访问A类的private成员，用于表示紧密的协作关系。",
  "打破封装": "友元机制的本质是在特定情况下允许外部访问private成员，是一种受控的封装打破，应谨慎使用。",
  "运算符重载需友元": "当运算符的左操作数不是当前类的对象时（如ostream& operator<<(ostream&, const T&)），必须将运算符重载为友元函数才能访问T的private成员。",
  "双向友元": "两个类互相声明对方为友元类，使两者均可访问对方的private成员，表示高度耦合的协作关系，应慎重使用。",
  "嵌套类": "在一个类内部定义的类，嵌套类的作用域被限制在外部类之内，对外不可见（除非通过typedef或public继承暴露），用于实现仅外部类需要的辅助类。",
  "内部类": "即嵌套类，Java中用此说法，C++中通常称嵌套类（nested class）。",
  "局部类": "在函数体内部定义的类，仅在函数体内可见，常用于需要临时封装一小段逻辑的场景，C++11起局部类可以定义构造函数。",
  "外围类访问": "C++中嵌套类不能隐式访问外围类的成员（与Java不同），必须通过指针或引用显式传入外围类对象。",
  "嵌套类访问外围": "嵌套类可以访问外围类的static成员、枚举值、类型别名，但不能访问外围类的非static成员（除非持有外围类对象）。",
  "作用域隔离": "嵌套类的核心价值，将只被外部类使用的辅助类隐藏在外部类内部，避免污染外部命名空间。",
  "流": "C++中用于输入输出的抽象概念，核心是iostream库，将输入输出统一为\"流\"的操作，支持类型安全的格式化I/O。",
  "iostream": "C++标准I/O库，定义了cin（标准输入）、cout（标准输出）、cerr（标准错误）、clog（标准日志）四个全局流对象。",
  "cin": "istream类型的全局对象，代表标准输入（通常对应键盘），使用>>运算符读取数据，自动处理类型转换和空白字符跳过。",
  "cout": "ostream类型的全局对象，代表标准输出（通常对应终端），使用<<运算符输出数据，支持链式调用。",
  "cerr": "ostream类型的全局对象，代表标准错误输出，与cout不同，cerr是无缓冲的，输出立即显示，适合输出错误信息。",
  "clog": "ostream类型的全局对象，代表标准日志输出，有缓冲，适合输出程序运行日志信息。",
  "文件流": "fstream库提供的文件I/O类，包括ifstream（文件输入）、ofstream（文件输出）、fstream（文件输入输出），通过open()/close()管理文件。",
  "fstream": "C++标准库中的文件流类，ifstream继承自istream、ofstream继承自ostream，因此可以像使用cin/cout一样使用文件流。",
  "stringstream": "C++标准库中的字符串流类，包括istringstream（从字符串读取）、ostringstream（向字符串写入），常用于字符串解析和格式化。",
  "格式化输出": "通过流操纵符（如setw、setprecision、hex、fixed等）控制输出格式，C++的流支持丰富的格式化选项。",
  "编译依赖": "一个文件在编译时依赖另一个文件的内容（如头文件），被依赖文件的修改会导致依赖文件重新编译，是大型项目编译时间的主要来源。",
  "前向声明": "在使用一个类/函数之前，仅声明其存在（如class A;）而不包含其完整定义，可减少编译依赖，加快编译速度。",
  "减少依赖": "通过前向声明替代#include、使用Pimpl模式、依赖注入等手段，降低类之间的编译期依赖，是大型C++项目设计的核心考量。",
  "接口隔离": "SOLID五大设计原则之一（Interface Segregation Principle），客户端不应该被迫依赖它不使用的接口，应将胖接口拆分为多个小接口。",
  "Pimpl模式": "Pointer to Implementation模式，将类的私有数据成员和实现细节放在一个Impl结构体中，通过指针间接访问，头文件中只需前向声明Impl，大幅减少编译依赖。",
  "编译防火墙": "Pimpl模式的效果比喻，通过将实现细节隔离到.cpp文件中，使头文件极简，修改实现不会导致大量重编译，像防火墙一样隔离了编译依赖。",
  "类间关系": "面向对象设计中类与类之间的各种关联方式，UML定义了六种类间关系：依赖、关联、聚合、组合、继承、实现。",
  "关联": "Association，类之间的结构化关系，表示一个类\"知道\"另一个类，通常通过指针或引用成员实现，如Student类有一个指向Dorm的指针。",
  "聚合": "Aggregation，一种特殊的关联，表示\"整体-部分\"关系，但部分可以独立于整体存在（生命周期不一致），如班级与学生（班级解散学生仍在）。",
  "组合": "Composition，一种特殊的关联，表示强\"整体-部分\"关系，部分的生命周期完全依赖于整体（整体销毁时部分也销毁），如人与心脏。",
  "依赖": "Dependency，最弱的类间关系，表示一个类\"使用\"另一个类，通常体现在局部变量、函数参数、函数返回值中，不改变类的结构。",
  "UML类图": "统一建模语言中用于描述类结构和类间关系的图形表示法，是面向对象设计和交流的重要工具。",
  "关系建模": "用UML类图等工具将现实世界中的概念关系映射为程序中的类间关系，是面向对象分析设计的核心活动。",
  "关联关系": "关联的具体表现形式，在C++中通常用指针或引用数据成员实现，可以是单向的也可以是双向的。",
  "双向关联": "关联双方互相持有对方的指针/引用，均可主动发起消息，实现时需注意不形成循环引用（可用weak_ptr）。",
  "单向关联": "只有一方持有另一方的指针/引用，信息的流动是单向的，是更松耦合的设计。",
  "多重性": "UML中描述关联关系两端数量对应关系的方式，如1对1、1对多、多对多等。C++中用单指针（1对1）或容器（1对多）实现。",
  "导航性": "关联关系中可以从哪一端访问另一端，单向关联只有一侧可导航，双向关联两侧均可导航。",
  "指针成员": "类中用原始指针作为数据成员实现关联关系的常见方式，需小心管理所指对象的生命周期。",
  "引用成员": "类中用引用作为数据成员（必须在初始化列表中初始化），可实现关联但不能重新绑定，比指针更严格。",
  "部分-整体": "聚合和组合关系的本质，描述\"整体\"和\"组成部分\"之间的关系，是has-a语义。",
  "生命周期一致即组合": "如果\"部分\"的生命周期和\"整体\"完全一致（整体销毁时部分也必须销毁），这种关系应建模为组合（用值对象或智能指针在整体析构时自动释放）。",
  "不一致即聚合": "如果\"部分\"可以独立于\"整体\"存在，这种关系应建模为聚合（整体中存放指针或shared_ptr，部分也可被其他对象共享）。",
  "has-a关系": "聚合和组合共同表达的语义：\"A has a B\"（A包含B），与继承的is-a关系相对，是代码复用和建模的另一种重要方式。",
  "UML菱形": "UML类图中，组合关系用实心菱形（靠近整体端）、聚合关系用空心菱形（靠近整体端）表示。",
  "依赖关系": "最松散的类间关系，表示\"A使用B\"但不会永久持有B的引用，体现在函数参数、局部变量、静态函数调用等场景中。",
  "使用即依赖": "只要一个类的实现中涉及了另一个类（作为类型、调用静态方法等），就产生了依赖关系。",
  "参数依赖": "依赖关系的最常见形式：函数参数中使用了某个类类型，函数体执行时\"依赖\"该类型的对象完成工作。",
  "静态成员调用": "如果一个类调用了另一个类的静态成员函数或访问了其静态数据成员，也构成依赖关系。",
  "弱耦合": "依赖关系是最弱（耦合度最低）的类间关系，因为被依赖者的变化（只要接口不变）不会影响依赖者的编译。",
  "关联案例": "课程中的具体编程案例，通过实现Student类和Dorm类之间的关联关系，展示指针成员、多重性、导航性等概念的实际代码。",
  "Student类": "案例中的学生类，包含一个指向Dorm的指针成员，展示\"学生关联到宿舍\"的关系建模方式。",
  "Dorm类": "案例中的宿舍类，作为Student类关联的目标，展示整体-部分关系的\"部分\"端。",
  "指针关联": "用原始指针（或智能指针）作为数据成员来实现类间关联关系的C++惯用方式。",
  "多对一": "多重性的一种：多个Student对象关联到同一个Dorm对象（宿舍住多个学生），在Student端用指针、Dorm端可用容器存储所有关联学生。",
  "案例设计": "通过具体代码案例来说明抽象概念（如类间关系）的教学方法，比纯理论讲解更易理解。",
  "反向关联": "关联关系如果需要在两端都能导航，则需要在两端都定义关联成员（如Dorm中也存储Student的指针/引用），实现双向关联。",
  "双向关联实现": "在关联的两端都定义指针/引用成员，使得任一方都可以访问另一方，需要注意在构造和析构时维护关联的一致性。",
  "宿舍管理学生": "案例中Dorm类需要提供添加学生、移除学生、获取所有学生等方法，体现\"整体管理部分\"的责任分配。",
  "容器成员": "类中用STL容器（如vector、list）作为数据成员来存储多个关联对象，是实现一对多关联的常用方式。",
  "vector存储": "使用std::vector作为容器成员来存储关联对象，vector自动管理内存，是简单高效的选择。",
  "OOP三大特征": "封装（Encapsulation）、继承（Inheritance）、多态（Polymorphism），是面向对象编程的三个核心支柱。",
  "面向对象核心思想": "将现实世界中的事物抽象为程序中的对象，通过对象之间的消息传递完成计算，以更接近人类思维的方式组织软件。",
  "过程抽象": "将一段反复使用的操作序列封装为函数（过程），通过函数名和参数调用，隐藏具体操作步骤。",
  "接口抽象": "将类的对外接口（能做什么）与其内部实现（怎么做）分离，接口保持稳定，实现可以自由演化。",
  "表示即实现": "抽象的反面：具体类必须描述对象在内存中如何表示（有哪些数据成员），抽象只关心行为不关心表示。",
  "建模": "将现实世界中的问题、概念、流程映射为程序中的类、对象、关系的活动，是面向对象分析和设计的核心工作。",
  "接口稳定": "良好的面向对象设计追求的目标：类的公开接口一经发布应尽量避免修改（符合开闭原则），修改实现不影响使用者。",
  "修改实现不影响用户": "信息隐蔽的核心价值：只要接口不变，类的内部实现可以自由修改、优化、Bug修复，使用者代码无需重新编译或修改。",
  "封装的体现": "C++中封装通过class的访问说明符（private隐藏实现、public暴露接口）、分离编译等方式具体体现。",
  "黑盒复用": "通过对象组合（has-a关系）实现的代码复用，被复用对象的内部实现不可见，只能通过接口交互，耦合度低，是推荐的首选复用方式。",
  "头文件声明": "将类的声明（接口）放在.h文件中，供其他文件#include，是实现信息隐蔽和分离编译的基础。",
  "cpp实现": "将类的成员函数实现放在.cpp文件中，隐藏实现细节，修改实现只需重新编译该.cpp文件。",
  "修改实现不重新编译": "分离编译的目标之一：如果只修改了.cpp中的实现而未改动.h中的接口，那么包含该.h的其他.cpp文件无需重新编译，只需重新链接。",
  "降低耦合": "面向对象设计的重要目标，类与类之间的依赖程度应尽量低，修改一个类对其它类的影响尽量小。",
  "类设计": "设计新类时需要考虑：该类承担什么责任、有哪些数据成员、哪些操作、如何初始化、如何拷贝/赋值/销毁、如何扩展等。",
  "类间协作": "对象之间通过方法调用（消息传递）来协作完成功能，良好的设计应使协作清晰、责任分配合理。",
  "责任分配": "面向对象设计中的核心问题：哪个类负责哪个功能？合理分配责任使系统高内聚、低耦合。GRASP原则对此提供了指导。",
  "GRASP原则": "General Responsibility Assignment Software Patterns，通用责任分配软件模式，包括信息专家、创建者、控制器等9种模式，指导面向对象设计中的责任分配决策。",
  "低耦合高内聚": "优秀面向对象设计的两个核心指标：低耦合（类间依赖少）、高内聚（类内部责任紧密相关），两者常常需要权衡。",
  "设计思路": "进行面向对象设计时的思考路径：先识别问题域中的概念和职责，再决定类、关系、接口。",
  "单一职责": "SOLID五大设计原则之一（Single Responsibility Principle），一个类应该只有一个引起它变化的原因，即一个类只负责一项职责。",
  "开闭原则": "SOLID五大设计原则之一（Open-Closed Principle），软件实体（类、模块、函数）应该对扩展开放、对修改关闭，通过抽象和多态实现。",
  "里氏替换": "SOLID五大设计原则之一（Liskov Substitution Principle），子类对象必须能够替换掉所有父类对象且不破坏程序的正确性，是继承合理性的重要判断标准。",
  "依赖倒置": "SOLID五大设计原则之一（Dependency Inversion Principle），高层模块不应依赖低层模块，两者都应依赖抽象；抽象不应依赖细节，细节应依赖抽象。",
  "SOLID原则": "由Robert C. Martin提出的五大面向对象设计原则的首字母缩写：SRP、OCP、LSP、ISP、DIP，是设计高质量面向对象系统的重要指导。",
  "类设计原则": "设计类时应遵循的原则集合，包括SOLID原则、优先使用组合而非继承、信息隐蔽、低耦合高内聚等。",
  "类方法设计": "设计类的静态（static）成员函数，这类函数不依赖于具体对象实例，常用于工具方法、工厂方法等场景。",
  "static方法": "用static修饰的成员函数，没有this指针，可通过类名::直接调用，常用于实现与类相关但不依赖于对象状态的工具函数。",
  "工具类": "只包含静态方法和静态成员的类（如Java的Math类），C++中通常用namespace或所有成员为static的类实现。",
  "Math类": "工具类的典型例子，提供数学运算相关的静态方法（如sqrt、sin、max等），无需实例化即可使用。",
  "无需实例化": "工具类和namespace的优势：使用者无需创建对象即可调用功能，简化使用方式。",
  "案例": "同综合案例，通过完整的小项目或代码片段展示知识点在实际中如何运用。",
  "分页器": "Web开发中常用的组件，负责将大量数据分页显示，涉及计算总页数、当前页数据范围、生成页码链接等逻辑，是OOP设计综合练习的好题目。",
  "Paginator类": "课程中设计的分页器类，封装了分页逻辑（总条数、每页条数、当前页、总页数等），是综合运用封装、类设计原则的案例。",
  "分页逻辑": "分页器核心算法：根据总数据条数和每页条数计算总页数、根据当前页计算数据起始位置、判断是否有上一页/下一页等。",
  "综合设计案例": "将多个知识点（封装、类设计、可能还涉及继承/多态）综合运用的完整设计案例，比单一知识点案例更接近实际开发。",
  "OOP设计实践": "通过实际案例练习面向对象设计和编程，将理论知识转化为实际能力的过程。",
  "白盒复用": "通过继承（is-a关系）实现的代码复用，派生类可以看到基类的protected成员，对基类实现有了解，耦合度高，应谨慎使用。",
  "组合复用": "即黑盒复用，通过在类中包含其他类的对象（或指针）来实现功能复用，符合has-a语义，是比继承更松耦合的设计选择。",
  "继承复用": "即白盒复用，通过继承基类来复用其代码，表达is-a关系，但会导致派生类与基类紧密耦合。",
  "优点缺点": "继承的优点：代码复用方便、多态支持；缺点：紧耦合、脆弱基类问题、破坏封装。组合的优点：松耦合、灵活性高；缺点：需要手动委托调用。",
  "复用方式选择": "优先使用组合（has-a），只在确实是is-a关系且需要多态时才用继承，是面向对象设计的重要经验法则。",
  "派生": "从基类创建新类（派生类）的过程，派生类拥有基类的所有非private成员，还可增加新成员或重定义基类行为。",
  "基类": "被继承的类，又称父类、超类，定义了派生类可复用的接口和实现，通常代表更抽象的概念。",
  "父类": "同基类，\"父\"强调派生类与基类的上下级关系，如Animal是父类，Dog是子类。",
  "子类": "继承其他类的新类，又称派生类，拥有父类的成员并可扩展或重定义，如Dog是Animal的子类。",
  "派生类": "同子类，C++中更常用\"派生类\"这一说法，如class Dog : public Animal { ... };中Dog是派生类。",
  "is-a关系": "继承关系的语义基础：派生类对象\"是一个\"基类对象（如Dog is an Animal），只有符合is-a关系时才应使用继承。",
  "代码复用": "通过继承或组合避免重复编写相同代码，是提高开发效率和代码可维护性的核心手段。",
  "public继承": "最常用的继承方式，class D : public B { ... };，基类的public成员在派生类中仍为public，protected仍为protected，表达is-a关系。",
  "protected继承": "class D : protected B { ... };，基类的public和protected成员在派生类中均变为protected，外部无法直接访问，不常用。",
  "private继承": "class D : private B { ... };，基类的public和protected成员在派生类中均变为private，外部和 further 派生类都无法访问，语义上不是is-a而更像是组合。",
  "访问权限变化": "不同继承方式会导致基类成员在派生类中的访问级别发生变化，规则：派生类中的访问级别 = min(基类中原级别, 继承方式)。",
  "派生类访问基类": "派生类的成员函数可以直接访问基类的public和protected成员（通过this隐式或基类名::显式），但不能访问private成员。",
  "不可访问": "基类private成员在派生类中存在（占用内存）但无法通过派生类的任何方式直接访问，只能通过基类的public/protected成员函数间接访问。",
  "派生类构造": "创建派生类对象时，先调用基类的构造函数（默认调用无参构造，或需在初始化列表中显式指定），再执行派生类自身的构造。",
  "基类构造先调用": "派生类构造函数的初始化列表中，基类构造必须（隐式或显式）先执行，因为派生类成员可能依赖基类部分已初始化。",
  "初始化列表调基类": "在派生类构造函数的初始化列表中显式调用基类构造函数，如Dog::Dog(int a) : Animal(a) { ... }，当基类没有无参构造时必须这样做。",
  "析构顺序相反": "派生类对象销毁时，先调用派生类析构函数，再调用基类析构函数，与构造顺序严格相反，确保派生类析构时基类部分仍有效。",
  "构造析构调用链": "多层继承时，构造从最顶层基类开始逐层向下，析构从最底层派生类开始逐层向上，形成严格的调用链。",
  "派生类拷贝构造": "派生类的拷贝构造函数必须显式调用基类的拷贝构造函数（在初始化列表中），否则基类部分会执行默认构造而非拷贝构造。",
  "调用基类拷贝构造": "如Dog::Dog(const Dog& other) : Animal(other), ... { ... }，将other的基类部分通过Animal的拷贝构造来初始化。",
  "派生类赋值运算符": "派生类的operator=必须显式调用基类的operator=（在函数体中），否则基类部分不会被正确赋值。",
  "调用基类赋值": "如Dog& Dog::operator=(const Dog& other) { Animal::operator=(other); ... return *this; }，先赋值基类部分再赋值派生类新增部分。",
  "切片问题": "将派生类对象赋值给基类对象时（按值），派生类新增的部分会被\"切掉\"（slice），只保留基类部分，是多态按值传递的主要陷阱。",
  "new定义": "在派生类中定义一个与基类同名但参数不同的函数，此时基类同名函数在派生类中被隐藏（而非覆盖），通常通过using声明或不同参数区分。",
  "redefine重定义": "同new定义，在C++早期文献中的说法，指在派生类中重新定义一个函数（即使参数相同也不同，除非用virtual）。",
  "overload重载": "同一作用域内同名函数参数不同，编译期确定调用哪一个，与继承和虚函数无关。",
  "override覆盖": "派生类重定义基类的虚函数，函数签名必须完全相同（C++11建议加override关键字），实现运行期多态。",
  "hide隐藏": "派生类中定义了与基类同名但参数不同的函数（或非虚函数同名），导致基类版本在派生类中不可见，这是名字隐藏而非多态。",
  "名称隐藏": "C++中派生类作用域会隐藏基类中同名的非虚函数，即使参数不同也会隐藏，需通过基类::名显式访问或通过using声明引入。",
  "重写与重载区别": "重写（override）：派生类重定义基类虚函数，运行期多态，签名相同；重载（overload）：同一作用域同名函数参数不同，编译期确定。",
  "替代原则": "即里氏替换原则（LSP），如果派生类对象可以无缝替换基类对象且程序行为不变，则继承是合理的。",
  "里氏替换原则": "Liskov Substitution Principle，SOLID中的L，子类必须能够替换掉所有父类对象，且程序行为不变，是判断继承是否合理的关键标准。",
  "鸭子类型": "动态类型语言中的概念：\"如果它走起来像鸭子、叫起来像鸭子，那它就是鸭子\"，不要求显式继承，只要求接口兼容。C++中通过模板和concepts可模拟。",
  "继承语义": "继承应该表达\"is-a\"关系，且必须符合里氏替换原则，否则应改用组合。",
  "不当继承": "不符合is-a关系或里氏替换原则的继承设计，如让Square继承Rectangle（设置长宽时会破坏不变量），是常见设计错误。",
  "继承vs组合": "继承表达is-a（白盒复用、紧耦合），组合表达has-a（黑盒复用、松耦合），优先使用组合。",
  "has-a vs is-a": "has-a用组合（类A有一个B成员），is-a用继承（类A是一个B的派生类），正确区分是面向对象设计的基本功。",
  "组合优先": "GoF（Gang of Four）设计模式书中的建议：优先使用对象组合而非类继承，以获得更大的灵活性和可维护性。",
  "继承耦合高": "继承使派生类与基类紧密耦合（基类实现细节可能影响派生类），修改基类很容易破坏派生类，是\"脆弱基类\"问题的根源。",
  "设计选择": "在继承和组合之间的选择：is-a且需要多态→继承；has-a或\"行为\"→组合；不确定→组合。",
  "委托": "Delegation，对象将某些职责转发给其包含的其他对象（组合关系中的对象），是实现代码复用和行为扩展的灵活方式，是组合的核心机制。",
  "继承类型转换": "在继承层次结构中，基类指针/引用与派生类指针/引用之间的相互转换，分为向上转型（安全）和向下转型（危险）。",
  "向上转型": "将派生类指针/引用转换为基类指针/引用，是隐式且绝对安全的，因为派生类对象\"是一个\"基类对象。",
  "向下转型": "将基类指针/引用转换为派生类指针/引用，是不安全的，除非该基类指针实际指向的是派生类对象，应用dynamic_cast进行安全检查。",
  "对象切片": "Slicing，将派生类对象按值赋给基类对象时，派生类新增部分被切除，只保留基类部分，行为通常不符合预期，是C++按值传递对象的陷阱。",
  "类型兼容": "向上转型之所以安全，是因为派生类\"类型兼容\"于基类（派生类对象可以满足基类接口的所有要求）。",
  "派生类转基类": "向上转型，可以隐式完成（如Base* pb = &derived;），无需显式转换符。",
  "upcasting": "向上转型的英文说法，upcasting，是安全的类型转换。",
  "派生类指针转基类": "向上转型的指针版本，Base* pb = &d;（d是Derived对象），安全且常用。",
  "安全": "向上转型是绝对安全的，因为派生类对象一定包含完整的基类子对象。向下转型需dynamic_cast检查。",
  "多态基础": "动态编联和多态的基础是：通过基类指针/引用调用虚函数时，实际执行的是对象真实类型的覆盖版本。",
  "static_cast": "C++四种显式转换符之一，用于良性转换（如int到double、派生类*到基类*、void*到具体类型*等），编译期检查，不提供运行期安全检查。",
  "dynamic_cast": "RTTI的核心运算符，用于继承层次中的安全向下转型，运行期检查对象真实类型，失败返回nullptr（指针）或抛异常（引用）。要求被转型的类型至少含有一个虚函数。",
  "const_cast": "C++四种显式转换符之一，用于移除对象的const或volatile限定符，是唯一能移除const的转换符，使用需谨慎（若原对象本身是const则未定义行为）。",
  "reinterpret_cast": "C++四种显式转换符之一，执行低级的重新解释位模式转换（如int*到char*、指针到整数），极其危险，应尽量避免使用。",
  "C风格转换": "(type)expr 或 type(expr) 形式的转换，在C++中应避免使用，因为它可能对应以上四种cast中的任意一种，行为不可控；应改用具体的C++风格转换符。",
  "安全转换": "使用C++四种cast运算符（尤其是dynamic_cast做向下转型）可以实现类型安全的转换，比C风格转换更安全、更清晰地表达意图。",
  "RTTI转换": "Runtime Type Identification，运行期类型识别，dynamic_cast和typeid是RTTI的核心机制，允许在运行期查询对象的真实类型。",
  "多重继承": "Multiple Inheritance，一个派生类同时继承多个基类的特性，如class D : public B1, public B2 { ... };。功能强大但引入复杂性。",
  "多个基类": "多重继承中派生类直接继承的多个父类，每个基类的成员都会出现在派生类中（虚继承除外）。",
  "语法": "C++中多重继承的语法：class D : public B1, public B2, ... { ... };，基类构造函数的调用顺序由继承声明的顺序决定（而非初始化列表中的顺序）。",
  "成员访问": "多重继承中访问基类成员时，如果多个基类有同名成员，必须通过基类::成员来显式指定，否则产生二义性。",
  "二义性": "Ambiguity，多重继承中的主要问题：从不同基类继承了同名成员，不加限定地访问时编译器无法确定选择哪一个，编译报错。",
  "MI问题": "Multiple Inheritance带来的问题统称：二义性、菱形继承（数据冗余）、虚继承复杂性、构造顺序等。",
  "名字冲突": "多重继承中不同基类定义了同名成员导致的二义性问题，通过作用域解析符（基类::成员）消除。",
  "作用域解析": "通过显式指定基类名称来消除二义性，如d.B1::f(); 明确调用B1中的f()，但这样破坏了多态的优雅性。",
  "虚继承解决": "用virtual关键字修饰继承（如class B1 : virtual public A），使共同基类在派生类中只有一份副本，解决菱形继承问题。",
  "明确限定": "通过基类::消除二义性的做法，虽然有效但使代码与特定继承结构紧耦合，应尽量避免设计到需要这样做的地步。",
  "菱形继承": "Diamond Problem，多重继承的经典问题：D继承B1和B2，B1和B2都继承A，导致D中有两份A的成员，产生二义性和数据冗余。",
  "钻石问题": "同菱形继承，因类图形状像钻石而得名，是多重继承中最著名的问题。",
  "重复基类": "菱形继承中A被包含了两次，D对象中有两份A的子对象，访问A的成员时产生二义性。",
  "数据冗余": "菱形继承中D对象包含两份A的数据成员，浪费内存，更严重的是两份数据可能不一致。",
  "D->B->A, D->C->A": "菱形继承的典型结构：D继承B和C，B和C都继承A，从D到A有两条路径，导致A在D中出现两次。",
  "虚基类": "Virtual Base Class，用virtual继承的基类，虚基类的成员在最终派生类中只有一份，由最派生类的构造函数负责初始化。",
  "virtual inheritance": "虚继承的英文术语，在基类继承时加virtual关键字，如class B : virtual public A { ... };。",
  "虚继承": "用virtual关键字修饰的继承方式，确保虚基类在继承层次中只出现一次，解决菱形继承问题。",
  "共享基类": "虚继承的效果：虚基类被所有路径共享，最终派生类中只有一份虚基类的子对象。",
  "虚基类构造": "虚基类的构造函数由最派生类（most derived class）负责调用，而非直接派生类，这与普通继承的构造顺序不同。",
  "最派生类负责构造": "虚继承中的重要规则：继承层次中最底层的派生类必须在初始化列表中调用虚基类的构造函数，中间的派生类对虚基类构造的调用会被忽略。",
  "接口替代多重继承": "Java、C#等语言不支持多重继承，而是通过\"接口\"（纯抽象类）实现类似效果，C++中可用纯虚类模拟接口。",
  "抽象基类": "含有纯虚函数的类，不能实例化，只能作为基类被继承，派生类必须实现所有纯虚函数后才能实例化，可模拟接口。",
  "只继承一个实现": "避免多重继承复杂性的设计策略：继承一个具体类（实现），其他\"父类\"用接口（纯虚类）替代，这是Java/C#的做法，C++中也可采用。",
  "组合替代": "对于多重继承中要表达的\"具有多种特性\"的语义，很多时候可以用组合+接口（在C++中是组合+虚函数）来替代，设计更清晰。",
  "设计模式应对": "设计模式中的桥接模式（Bridge）、策略模式（Strategy）、状态模式（State）等，都提供了用组合替代多重继承的优雅方案。",
  "静态编联": "Static Binding，早绑定（Early Binding），函数调用在编译期就确定具体要调用的函数版本，如普通函数调用、通过对象（非指针/引用）调用的函数。",
  "动态编联": "Dynamic Binding，晚绑定（Late Binding），函数调用在运行期根据对象真实类型确定要调用的版本，C++通过虚函数机制实现。",
  "早绑定": "同静态编联，编译时编译器根据指针/引用的声明类型（而非实际指向的对象类型）确定调用哪个函数，对于非虚函数如此。",
  "晚绑定": "同动态编联，运行时通过对象的虚函数表（vtable）查找应该调用的函数版本，实现多态。",

let allConcepts = [];
let showPhil = true;

function init() {
  // 解析所有概念
  allConcepts = Object.entries(DEFS).map(([concept, definition]) => {
    const videos = VIDEO_MAP[concept] || [];
    const chapters = [...new Set(videos.map(v => CONCEPT_CH[v]?.chapter).filter(Boolean))];
    const philosophy = PHIL[concept] || '';
    
    return { concept, definition, philosophy, videos, chapters };
  });
  
  // 更新统计
  document.getElementById('totalConcepts').textContent = allConcepts.length;
  
  // 填充章节筛选器
  const chapterSelect = document.getElementById('chapterFilter');
  for (const [num, name] of Object.entries(CHAPTERS)) {
    const option = document.createElement('option');
    option.value = num;
    option.textContent = `第${num}章 ${name}`;
    chapterSelect.appendChild(option);
  }
  
  // 渲染概念
  renderConcepts(allConcepts);
}

function renderConcepts(concepts) {
  const grid = document.getElementById('conceptsGrid');
  const emptyState = document.getElementById('emptyState');
  
  if (concepts.length === 0) {
    grid.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  
  emptyState.style.display = 'none';
  grid.innerHTML = concepts.map(c => `
    <div class="concept-card">
      <div class="concept-title">${c.concept}</div>
      <div class="concept-definition">${c.definition}</div>
      ${showPhil && c.philosophy ? `<div class="concept-phil">${c.philosophy}</div>` : ''}
      <div class="concept-meta">
        ${c.videos.length > 0 ? 
          `<span class="chapter-badge">📹 ${c.videos.length}个视频</span>` +
          c.chapters.map(ch => `<span class="chapter-badge">第${ch}章</span>`).join('')
          : '<span class="chapter-badge">暂无视频</span>'}
      </div>
      ${c.videos.length > 0 ? `
        <div style="margin-top:8px;">
          ${c.videos.slice(0, 3).map(v => {
            const info = CONCEPT_CH[v];
            return `<a href="https://www.bilibili.com/video/BV1ai4y1t7cs?p=${v}" target="_blank" class="video-link">▶ 第${v}集: ${info?.title || '查看'}</a><br>`;
          }).join('')}
          ${c.videos.length > 3 ? '<span style="font-size:12px;color:#999;">...</span>' : ''}
        </div>
      ` : ''}
    </div>
  `).join('');
}

function filterConcepts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const chapter = document.getElementById('chapterFilter').value;
  
  let filtered = allConcepts;
  
  if (search) {
    filtered = filtered.filter(c => 
      c.concept.toLowerCase().includes(search) || 
      c.definition.toLowerCase().includes(search) ||
      c.philosophy.toLowerCase().includes(search)
    );
  }
  
  if (chapter !== 'all') {
    filtered = filtered.filter(c => c.chapters.includes(parseInt(chapter)));
  }
  
  renderConcepts(filtered);
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('chapterFilter').value = 'all';
  filterConcepts();
}

function togglePhil() {
  showPhil = !showPhil;
  renderConcepts(allConcepts);
}

window.addEventListener('DOMContentLoaded', init);
</script>
